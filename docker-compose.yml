services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: zentrik-sendio:latest
    container_name: zentrik-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - internal
      - proxy-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/es || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
  proxy-network:
    external: true
